name: atlas-rag

x-ai-service: &ai-service
  build:
    context: ../..
    dockerfile: services/ai/Dockerfile
  image: atlas-rag-ai:local
  environment: &ai-environment
    DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    MINIO_USE_SSL: "false"
    MINIO_QUARANTINE_BUCKET: ${MINIO_QUARANTINE_BUCKET:-atlas-rag-quarantine}
    CLAMAV_HOST: clamav
    CLAMAV_PORT: 3310
    CLAMAV_REQUIRED: "true"
  depends_on: &ai-dependencies
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
    clamav:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:0.8.5-pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    mem_limit: 1g
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.17
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.license.self_generated.type: basic
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "127.0.0.1:${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --silent --fail --user elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health?wait_for_status=yellow",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 45s
    mem_limit: 2g
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26.28-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1' >/dev/null",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    mem_limit: 1g
    restart: unless-stopped

  redis:
    image: redis:8.4.4-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    mem_limit: 512m
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    mem_limit: 1g
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_QUARANTINE_BUCKET: ${MINIO_QUARANTINE_BUCKET:-atlas-rag-quarantine}
      MINIO_DOCUMENT_BUCKET: ${MINIO_DOCUMENT_BUCKET:-atlas-rag-documents}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${MINIO_QUARANTINE_BUCKET}" &&
        mc mb --ignore-existing "local/$${MINIO_DOCUMENT_BUCKET}" &&
        mc anonymous set none "local/$${MINIO_QUARANTINE_BUCKET}" &&
        mc anonymous set none "local/$${MINIO_DOCUMENT_BUCKET}"
    restart: "no"

  clamav:
    image: clamav/clamav:1.4.3
    ports:
      - "127.0.0.1:${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s
    mem_limit: 2g
    restart: unless-stopped

  ai:
    <<: *ai-service
    command: ["uvicorn", "rag_ai.main:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "127.0.0.1:${AI_SERVICE_PORT:-8001}:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/ready')",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  ai-worker:
    <<: *ai-service
    command: ["python", "-m", "rag_ai.worker_main"]
    healthcheck:
      disable: true

volumes:
  postgres-data:
  elasticsearch-data:
  neo4j-data:
  neo4j-logs:
  redis-data:
  minio-data:
  clamav-data:
